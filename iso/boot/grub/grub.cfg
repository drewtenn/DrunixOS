set timeout=0
set default=0

# To boot directly to a console without rebuilding, change the `set default=0`
# line above to `set default=1` for the framebuffer console or `set default=2`
# for the VGA text console. Hold SHIFT at boot to interrupt and pick from the
# menu.

menuentry "Drunix" {
    multiboot /boot/kernel.elf
    boot
}

menuentry "Drunix (text console)" {
    multiboot /boot/kernel.elf nodesktop
    boot
}

menuentry "Drunix (VGA text console)" {
    terminal_output console
    terminal_input console
    set gfxpayload=text
    multiboot /boot/kernel-vga.elf nodesktop vgatext
    boot
}
