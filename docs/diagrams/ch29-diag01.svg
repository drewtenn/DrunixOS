      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="389.67999999999995" height="722" rx="12"/>
  <text class="title" x="44" y="42">How make debug sets up GDB</text>
  <text class="muted" x="44" y="68">QEMU opens the remote stub, GDB loads local</text>
  <text class="muted" x="44" y="84">symbols, then the two exchange state until you</text>
  <text class="muted" x="44" y="100">tell the CPU to run.</text>
  <rect class="panel" x="34" y="130" width="321.67999999999995" height="544" rx="10"/>
  <rect class="gray" x="67.99999999999999" y="156" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="182.0" text-anchor="middle" dominant-baseline="middle">QEMU -s -S</text>
  <text class="muted" x="194.8" y="198.0" text-anchor="middle" dominant-baseline="middle">open port, keep CPU paused</text>
  <line class="arrow" x1="194.83999999999997" y1="232" x2="194.83999999999997" y2="250"/>
  <rect class="blue" x="67.99999999999999" y="262" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="288.0" text-anchor="middle" dominant-baseline="middle">GDB file kernel.elf</text>
  <text class="muted" x="194.8" y="304.0" text-anchor="middle" dominant-baseline="middle">load symbols locally</text>
  <line class="arrow" x1="194.83999999999997" y1="338" x2="194.83999999999997" y2="356"/>
  <rect class="blue" x="67.99999999999999" y="368" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="394.0" text-anchor="middle" dominant-baseline="middle">target remote</text>
  <text class="muted" x="194.8" y="410.0" text-anchor="middle" dominant-baseline="middle">connect to QEMU stub</text>
  <line class="arrow" x1="194.83999999999997" y1="444" x2="194.83999999999997" y2="462"/>
  <rect class="blue" x="67.99999999999999" y="474" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="500.0" text-anchor="middle" dominant-baseline="middle">Inspect State</text>
  <text class="muted" x="194.8" y="516.0" text-anchor="middle" dominant-baseline="middle">read regs and memory</text>
  <line class="arrow" x1="194.83999999999997" y1="550" x2="194.83999999999997" y2="568"/>
  <rect class="amber" x="67.99999999999999" y="580" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="606.0" text-anchor="middle" dominant-baseline="middle">Type continue</text>
  <text class="muted" x="194.8" y="622.0" text-anchor="middle" dominant-baseline="middle">CPU starts running</text>
  <text class="muted" x="355.7" y="704.0" text-anchor="end">Chapter 29, Figure 1</text>
</svg>
