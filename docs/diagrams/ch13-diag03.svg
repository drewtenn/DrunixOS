<svg xmlns="http://www.w3.org/2000/svg" width="1055.2941176470588" height="294" viewBox="0 0 1055.2941176470588 294" role="img" aria-labelledby="title desc">
  <title id="title">Read one filesystem block</title>
  <desc id="desc">One 4 KB filesystem block is assembled from eight consecutive disk sectors.</desc>
