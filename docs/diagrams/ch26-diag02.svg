<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560" role="img" aria-labelledby="title desc">
  <title id="title">PTE state machine</title>
  <desc id="desc">Writable pages become copy-on-write during fork(), while true read-only pages stay read-only.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="860" height="560" rx="12"/>
  <text class="title" x="44" y="42">PTE state machine</text>
  <text class="muted" x="44" y="68">Writable pages become copy-on-write during fork(), while true read-only pages stay read-only.</text>
  <rect class="panel" x="34" y="98" width="792" height="414" rx="10"/>
  <rect class="blue" x="314.16" y="138.48" width="231.68" height="65.16" rx="7"/>
  <text class="label" x="430.0" y="155.1" text-anchor="middle" dominant-baseline="middle">fork inspects user PTE</text>
  <text class="muted" x="430.0" y="171.1" text-anchor="middle" dominant-baseline="middle">decide whether the page is</text>
  <text class="muted" x="430.0" y="187.1" text-anchor="middle" dominant-baseline="middle">writable</text>
  <rect class="green" x="104.2" y="276.03999999999996" width="217.2" height="65.16" rx="7"/>
  <text class="label" x="212.8" y="292.6" text-anchor="middle" dominant-baseline="middle">writable page</text>
  <text class="muted" x="212.8" y="308.6" text-anchor="middle" dominant-baseline="middle">PG_WRITABLE set, PG_COW</text>
  <text class="muted" x="212.8" y="324.6" text-anchor="middle" dominant-baseline="middle">clear</text>
  <rect class="gray" x="538.6" y="276.03999999999996" width="217.2" height="65.16" rx="7"/>
  <text class="label" x="647.2" y="292.6" text-anchor="middle" dominant-baseline="middle">read-only page</text>
  <text class="muted" x="647.2" y="308.6" text-anchor="middle" dominant-baseline="middle">PG_WRITABLE clear, PG_COW</text>
  <text class="muted" x="647.2" y="324.6" text-anchor="middle" dominant-baseline="middle">clear</text>
  <rect class="amber" x="104.2" y="406.36" width="217.2" height="57.92" rx="7"/>
  <text class="label" x="212.8" y="419.3" text-anchor="middle" dominant-baseline="middle">shared CoW PTE</text>
  <text class="muted" x="212.8" y="435.3" text-anchor="middle" dominant-baseline="middle">later write promotes or</text>
  <text class="muted" x="212.8" y="451.3" text-anchor="middle" dominant-baseline="middle">copies</text>
  <rect class="gray" x="538.6" y="406.36" width="217.2" height="57.92" rx="7"/>
  <text class="label" x="647.2" y="427.3" text-anchor="middle" dominant-baseline="middle">shared read-only PTE</text>
  <text class="muted" x="647.2" y="443.3" text-anchor="middle" dominant-baseline="middle">later write still faults</text>
  <polyline class="arrow" points="314.2,171.1 212.8,171.1 212.8,276.0" fill="none"/>
  <rect class="edge-label-bg" x="113.7" y="209.7" width="63.2" height="18" rx="6"/>
  <text class="muted" x="118.68" y="221.74" text-anchor="start">writable</text>
  <polyline class="arrow" points="545.8,171.1 647.2,171.1 647.2,276.0" fill="none"/>
  <rect class="edge-label-bg" x="663.9" y="209.7" width="69.6" height="18" rx="6"/>
  <text class="muted" x="668.92" y="221.74" text-anchor="start">read-only</text>
  <polyline class="arrow" points="212.8,341.2 212.8,406.4" fill="none"/>
  <rect class="edge-label-bg" x="113.7" y="365.4" width="76.0" height="18" rx="6"/>
  <text class="muted" x="118.68" y="377.4" text-anchor="start">after fork</text>
  <polyline class="arrow" points="647.2,341.2 647.2,406.4" fill="none"/>
  <rect class="edge-label-bg" x="663.9" y="365.4" width="76.0" height="18" rx="6"/>
  <text class="muted" x="668.92" y="377.4" text-anchor="start">after fork</text>
  <text class="muted" x="826.0" y="542.0" text-anchor="end">Chapter 26, Figure 2</text>
</svg>
