<svg xmlns="http://www.w3.org/2000/svg" width="748" height="486" viewBox="0 0 748 486" role="img" aria-labelledby="title desc">
  <title id="title">New filesystem image</title>
  <desc id="desc">A 50 MiB disk image with metadata regions at the front and starter files in the data area.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="748" height="486" rx="12"/>
  <text class="title" x="44" y="42">New filesystem image</text>
  <text class="muted" x="44" y="68">A 50 MiB disk image with metadata regions at the front and starter files in the data area.</text>
  <rect class="panel" x="34" y="98" width="680" height="148" rx="10"/>
  <rect class="panel" x="34" y="268" width="680" height="170" rx="10"/>
  <text class="small" x="52" y="118" text-anchor="start">disk layout</text>
  <rect class="blue" x="52" y="140" width="119.41747572815534" height="56" rx="7"/>
  <text class="label" x="111.7" y="168.0" text-anchor="middle" dominant-baseline="middle">1</text>
  <rect class="green" x="179.41747572815535" y="140" width="121.79935275080906" height="56" rx="7"/>
  <text class="label" x="240.3" y="168.0" text-anchor="middle" dominant-baseline="middle">2-9</text>
  <rect class="amber" x="309.21682847896443" y="140" width="121.79935275080906" height="56" rx="7"/>
  <text class="label" x="370.1" y="168.0" text-anchor="middle" dominant-baseline="middle">10-17</text>
  <rect class="blue" x="439.0161812297735" y="140" width="124.80258899676376" height="56" rx="7"/>
  <text class="label" x="501.4" y="168.0" text-anchor="middle" dominant-baseline="middle">18-273</text>
  <rect class="green" x="571.8187702265373" y="140" width="124.18122977346279" height="56" rx="7"/>
  <text class="label" x="633.9" y="168.0" text-anchor="middle" dominant-baseline="middle">274+</text>
  <text class="muted" x="111.70873786407768" y="214" text-anchor="middle">superblock</text>
  <text class="muted" x="240.3171521035599" y="214" text-anchor="middle">inode bitmap</text>
  <text class="muted" x="370.11650485436894" y="214" text-anchor="middle">block bitmap</text>
  <text class="muted" x="501.4174757281554" y="214" text-anchor="middle">inode table</text>
  <text class="muted" x="633.9093851132686" y="214" text-anchor="middle">data region</text>
  <text class="small" x="52" y="288" text-anchor="start">starter files</text>
  <text class="small" x="52" y="330.0" text-anchor="start">/</text>
  <text class="muted" x="201.62266666666667" y="330.0" text-anchor="start">root directory entry</text>
  <text class="small" x="52" y="370.0" text-anchor="start">/shell</text>
  <text class="muted" x="201.62266666666667" y="370.0" text-anchor="start">shell program in the data region</text>
  <text class="small" x="52" y="410.0" text-anchor="start">/date</text>
  <text class="muted" x="201.62266666666667" y="410.0" text-anchor="start">date program stored later in the data region</text>
  <text class="muted" x="714.0" y="468.0" text-anchor="end">Chapter 13, Figure 7</text>
</svg>
