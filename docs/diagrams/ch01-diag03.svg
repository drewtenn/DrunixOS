<svg xmlns="http://www.w3.org/2000/svg" width="489.0" height="626" viewBox="0 0 489.0 626" role="img" aria-labelledby="title desc">
  <title id="title">Kernel image layout</title>
  <desc id="desc">The linker keeps boot-critical sections at the front.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="489.0" height="626" rx="12"/>
  <text class="title" x="44" y="42">Kernel image layout</text>
  <text class="muted" x="44" y="68">The linker keeps boot-critical sections at the front.</text>
  <rect class="panel" x="34" y="98" width="421.0" height="480" rx="10"/>
  <rect class="gray" x="68.0" y="124" width="353.0" height="84" rx="7"/>
  <text class="label" x="244.5" y="150.0" text-anchor="middle" dominant-baseline="middle">zeroed data</text>
  <text class="muted" x="244.5" y="166.0" text-anchor="middle" dominant-baseline="middle">uninitialized globals, memory bitmap, kernel</text>
  <text class="muted" x="244.5" y="182.0" text-anchor="middle" dominant-baseline="middle">stack</text>
  <rect class="blue" x="68.0" y="226" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="252.0" text-anchor="middle" dominant-baseline="middle">writable data</text>
  <text class="muted" x="244.5" y="268.0" text-anchor="middle" dominant-baseline="middle">mutable global values</text>
  <rect class="green" x="68.0" y="312" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="338.0" text-anchor="middle" dominant-baseline="middle">read-only data</text>
  <text class="muted" x="244.5" y="354.0" text-anchor="middle" dominant-baseline="middle">constant values</text>
  <rect class="amber" x="68.0" y="398" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="424.0" text-anchor="middle" dominant-baseline="middle">kernel code</text>
  <text class="muted" x="244.5" y="440.0" text-anchor="middle" dominant-baseline="middle">executable instructions</text>
  <rect class="blue" x="68.0" y="484" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="510.0" text-anchor="middle" dominant-baseline="middle">boot header</text>
  <text class="muted" x="244.5" y="526.0" text-anchor="middle" dominant-baseline="middle">GRUB header, first 8 KB</text>
  <text class="muted" x="455.0" y="608.0" text-anchor="end">Chapter 1, Figure 3</text>
</svg>
