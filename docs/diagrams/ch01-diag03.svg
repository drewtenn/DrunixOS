<svg xmlns="http://www.w3.org/2000/svg" width="489.0" height="686" viewBox="0 0 489.0 686" role="img" aria-labelledby="title desc">
  <title id="title">Kernel image layout</title>
  <desc id="desc">Sections grow upward from the load address, so the boot header sits at the lowest address.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="489.0" height="686" rx="12"/>
  <text class="title" x="44" y="42">Kernel image layout</text>
  <text class="muted" x="44" y="68">Sections grow upward from the load address, so the boot header</text>
  <text class="muted" x="44" y="84">sits at the lowest address.</text>
  <rect class="panel" x="34" y="114" width="421.0" height="524" rx="10"/>
  <text class="muted" x="244.5" y="154" text-anchor="middle">higher addresses</text>
  <rect class="gray" x="68.0" y="162" width="353.0" height="84" rx="7"/>
  <text class="label" x="244.5" y="188.0" text-anchor="middle" dominant-baseline="middle">zeroed data</text>
  <text class="muted" x="244.5" y="204.0" text-anchor="middle" dominant-baseline="middle">uninitialized globals, memory bitmap, kernel</text>
  <text class="muted" x="244.5" y="220.0" text-anchor="middle" dominant-baseline="middle">stack</text>
  <rect class="blue" x="68.0" y="264" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="290.0" text-anchor="middle" dominant-baseline="middle">writable data</text>
  <text class="muted" x="244.5" y="306.0" text-anchor="middle" dominant-baseline="middle">mutable global values</text>
  <rect class="green" x="68.0" y="350" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="376.0" text-anchor="middle" dominant-baseline="middle">read-only data</text>
  <text class="muted" x="244.5" y="392.0" text-anchor="middle" dominant-baseline="middle">constant values</text>
  <rect class="amber" x="68.0" y="436" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="462.0" text-anchor="middle" dominant-baseline="middle">kernel code</text>
  <text class="muted" x="244.5" y="478.0" text-anchor="middle" dominant-baseline="middle">executable instructions</text>
  <rect class="blue" x="68.0" y="522" width="353.0" height="68" rx="7"/>
  <text class="label" x="244.5" y="548.0" text-anchor="middle" dominant-baseline="middle">boot header</text>
  <text class="muted" x="244.5" y="564.0" text-anchor="middle" dominant-baseline="middle">GRUB header, first 8 KB</text>
  <text class="muted" x="244.5" y="606" text-anchor="middle">lower addresses (kernel loaded at 0x100000)</text>
  <text class="muted" x="455.0" y="668.0" text-anchor="end">Chapter 1, Figure 3</text>
</svg>
