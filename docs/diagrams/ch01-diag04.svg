<svg xmlns="http://www.w3.org/2000/svg" width="430.5" height="616" viewBox="0 0 430.5 616" role="img" aria-labelledby="title desc">
  <title id="title">AArch64 entry state</title>
  <desc id="desc">Register and privilege state when the primary core reaches the EL1 continuation after eret.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="430.5" height="616" rx="12"/>
  <text class="title" x="44" y="42">AArch64 entry state</text>
  <text class="muted" x="44" y="68">Register and privilege state when the primary core</text>
  <text class="muted" x="44" y="84">reaches the EL1 continuation after eret.</text>
  <rect class="panel" x="34" y="114" width="362.5" height="454" rx="10"/>
  <rect class="green" x="68.0" y="140" width="294.5" height="68" rx="7"/>
  <text class="label" x="215.2" y="166.0" text-anchor="middle" dominant-baseline="middle">Exception level</text>
  <text class="muted" x="215.2" y="182.0" text-anchor="middle" dominant-baseline="middle">EL1 (dropped from EL2 via eret)</text>
  <line class="arrow" x1="215.25" y1="216" x2="215.25" y2="234"/>
  <rect class="amber" x="68.0" y="246" width="294.5" height="84" rx="7"/>
  <text class="label" x="215.2" y="272.0" text-anchor="middle" dominant-baseline="middle">PC</text>
  <text class="muted" x="215.2" y="288.0" text-anchor="middle" dominant-baseline="middle">kernel EL1 entry point (0x80000 +</text>
  <text class="muted" x="215.2" y="304.0" text-anchor="middle" dominant-baseline="middle">offset)</text>
  <line class="arrow" x1="215.25" y1="338" x2="215.25" y2="356"/>
  <rect class="blue" x="68.0" y="368" width="294.5" height="68" rx="7"/>
  <text class="label" x="215.2" y="394.0" text-anchor="middle" dominant-baseline="middle">SP_EL1</text>
  <text class="muted" x="215.2" y="410.0" text-anchor="middle" dominant-baseline="middle">top of kernel stack region</text>
  <line class="arrow" x1="215.25" y1="444" x2="215.25" y2="462"/>
  <rect class="gray" x="68.0" y="474" width="294.5" height="68" rx="7"/>
  <text class="label" x="215.2" y="500.0" text-anchor="middle" dominant-baseline="middle">Secondary cores</text>
  <text class="muted" x="215.2" y="516.0" text-anchor="middle" dominant-baseline="middle">parked in spin loop</text>
  <text class="muted" x="396.5" y="598.0" text-anchor="end">Chapter 1, Figure 4</text>
</svg>
