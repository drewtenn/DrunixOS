<svg xmlns="http://www.w3.org/2000/svg" width="700.4" height="466" viewBox="0 0 700.4 466" role="img" aria-labelledby="title desc">
  <title id="title">VGA text buffer</title>
  <desc id="desc">Physical memory at 0xB8000 is a flat 80 x 25 text grid.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="700.4" height="466" rx="12"/>
  <text class="title" x="44" y="42">VGA text buffer</text>
  <text class="muted" x="44" y="68">Physical memory at 0xB8000 is a flat 80 x 25 text grid.</text>
  <rect class="panel" x="34" y="98" width="632.4" height="320" rx="10"/>
  <text class="colhead" x="66" y="132.2" text-anchor="start">address</text>
  <text class="colhead" x="189.42399999999998" y="132.2" text-anchor="start">row</text>
  <text class="colhead" x="345.29551999999995" y="132.2" text-anchor="start">first cells</text>
  <text class="colhead" x="634.3999999999999" y="132.2" text-anchor="end">last cell</text>
  <rect class="cell" x="298.2" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="318.1" y="160.8">'H'</text>
  <rect class="attr" x="344.6" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="364.5" y="160.8">0x0F</text>
  <rect class="cell" x="391.0" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="410.8" y="160.8">'i'</text>
  <rect class="attr" x="437.4" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="457.2" y="160.8">0x0F</text>
  <rect class="gap" x="483.8" y="151.6" width="57.8" height="18.4" rx="6"/>
  <rect class="cell" x="548.3" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="568.2" y="160.8">' '</text>
  <rect class="attr" x="594.7" y="151.6" width="39.7" height="18.4" rx="6"/>
  <text class="byte" x="614.6" y="160.8">0x0F</text>
  <text class="muted" x="512.7034279329607" y="164.78243999999998" text-anchor="middle">...</text>
  <text class="mono" x="66" y="166.3716" text-anchor="start">0xB8000</text>
  <text class="small" x="189.42399999999998" y="166.3716" text-anchor="start">row 0</text>
  <text class="mono" x="66" y="211.5372" text-anchor="start">+160</text>
  <text class="small" x="189.42399999999998" y="211.5372" text-anchor="start">row 1</text>
  <rect class="row" x="298.2" y="198.0" width="336.2" height="14.0" rx="6"/>
  <text class="muted" x="466.316" y="208.994544" text-anchor="middle">80 cells, 160 bytes</text>
  <text class="mono" x="66" y="256.7028" text-anchor="start">+320</text>
  <text class="small" x="189.42399999999998" y="256.7028" text-anchor="start">row 2</text>
  <rect class="row" x="298.2" y="243.2" width="336.2" height="14.0" rx="6"/>
  <text class="mono" x="66" y="301.86839999999995" text-anchor="start">+3840</text>
  <text class="small" x="189.42399999999998" y="301.86839999999995" text-anchor="start">row 24</text>
  <rect class="row" x="298.2" y="288.3" width="336.2" height="14.0" rx="6"/>
  <text class="muted" x="89.751" y="274.315376" text-anchor="middle">...</text>
  <text class="muted" x="452.86927999999995" y="274.315376" text-anchor="middle">...</text>
  <text class="muted" x="66" y="356" text-anchor="start">Each cell is two bytes: ASCII character, then attribute byte.</text>
  <text class="muted" x="66" y="374" text-anchor="start">Here the first two character cells spell 'Hi' on the screen.</text>
  <text class="muted" x="66" y="392" text-anchor="start">25 rows x 80 columns x 2 bytes = 4000 bytes.</text>
  <text class="muted" x="666.4" y="448.0" text-anchor="end">Chapter 3, Figure 1</text>
</svg>
