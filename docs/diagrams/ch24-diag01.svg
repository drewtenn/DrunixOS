<svg xmlns="http://www.w3.org/2000/svg" width="443.5" height="706" viewBox="0 0 443.5 706" role="img" aria-labelledby="title desc">
  <title id="title">Core dump file layout</title>
  <desc id="desc">An ELF core file begins with metadata, then stores Linux-compatible notes, Drunix forensics notes, and page-aligned memory segments.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="443.5" height="706" rx="12"/>
  <text class="title" x="44" y="42">Core dump file layout</text>
  <text class="muted" x="44" y="68">An ELF core file begins with metadata, then stores Linux-</text>
  <text class="muted" x="44" y="84">compatible notes, Drunix forensics notes, and page-aligned</text>
  <text class="muted" x="44" y="100">memory segments.</text>
  <rect class="panel" x="34" y="130" width="375.5" height="528" rx="10"/>
  <rect class="blue" x="68.0" y="156" width="307.5" height="68" rx="7"/>
  <text class="label" x="221.8" y="182.0" text-anchor="middle" dominant-baseline="middle">ELF header</text>
  <text class="muted" x="221.8" y="198.0" text-anchor="middle" dominant-baseline="middle">file type is ET_CORE</text>
  <rect class="green" x="68.0" y="242" width="307.5" height="84" rx="7"/>
  <text class="label" x="221.8" y="268.0" text-anchor="middle" dominant-baseline="middle">Program header table</text>
  <text class="muted" x="221.8" y="284.0" text-anchor="middle" dominant-baseline="middle">one PT_NOTE header plus PT_LOAD</text>
  <text class="muted" x="221.8" y="300.0" text-anchor="middle" dominant-baseline="middle">headers</text>
  <rect class="amber" x="68.0" y="344" width="307.5" height="84" rx="7"/>
  <text class="label" x="221.8" y="370.0" text-anchor="middle" dominant-baseline="middle">CORE notes</text>
  <text class="muted" x="221.8" y="386.0" text-anchor="middle" dominant-baseline="middle">NT_PRSTATUS and NT_PRPSINFO</text>
  <text class="muted" x="221.8" y="402.0" text-anchor="middle" dominant-baseline="middle">records</text>
  <rect class="green" x="68.0" y="446" width="307.5" height="84" rx="7"/>
  <text class="label" x="221.8" y="472.0" text-anchor="middle" dominant-baseline="middle">DRUNIX notes</text>
  <text class="muted" x="221.8" y="488.0" text-anchor="middle" dominant-baseline="middle">vmstat, fault, and maps text</text>
  <text class="muted" x="221.8" y="504.0" text-anchor="middle" dominant-baseline="middle">records</text>
  <rect class="blue" x="68.0" y="548" width="307.5" height="84" rx="7"/>
  <text class="label" x="221.8" y="574.0" text-anchor="middle" dominant-baseline="middle">Load segments</text>
  <text class="muted" x="221.8" y="590.0" text-anchor="middle" dominant-baseline="middle">copied user pages from the crashed</text>
  <text class="muted" x="221.8" y="606.0" text-anchor="middle" dominant-baseline="middle">process</text>
  <text class="muted" x="409.5" y="688.0" text-anchor="end">Chapter 24, Figure 1</text>
</svg>
