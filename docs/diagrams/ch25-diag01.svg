<svg xmlns="http://www.w3.org/2000/svg" width="860" height="664" viewBox="0 0 860 664" role="img" aria-labelledby="title desc">
  <title id="title">Page-fault decision tree</title>
  <desc id="desc">Recoverable user faults allocate heap or stack pages, or resolve copy-on-write, before the instruction is retried.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="860" height="664" rx="12"/>
  <text class="title" x="44" y="42">Page-fault decision tree</text>
  <text class="muted" x="44" y="68">Recoverable user faults allocate heap or stack pages, or resolve copy-on-write, before the instruction is retried.</text>
  <rect class="panel" x="34" y="98" width="792" height="518" rx="10"/>
  <rect class="blue" x="335.88" y="133.32" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="430.0" y="155.6" text-anchor="middle" dominant-baseline="middle">page fault</text>
  <text class="muted" x="430.0" y="171.6" text-anchor="middle" dominant-baseline="middle">CR2 + error code saved</text>
  <rect class="amber" x="335.88" y="263.79999999999995" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="430.0" y="286.1" text-anchor="middle" dominant-baseline="middle">U bit set?</text>
  <text class="muted" x="430.0" y="302.1" text-anchor="middle" dominant-baseline="middle">ring 3 fault</text>
  <rect class="gray" x="639.96" y="263.79999999999995" width="130.32" height="60.580000000000005" rx="7"/>
  <text class="label" x="705.1" y="278.1" text-anchor="middle" dominant-baseline="middle">kernel fault</text>
  <text class="muted" x="705.1" y="294.1" text-anchor="middle" dominant-baseline="middle">print state and</text>
  <text class="muted" x="705.1" y="310.1" text-anchor="middle" dominant-baseline="middle">halt</text>
  <rect class="amber" x="335.88" y="394.28" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="430.0" y="416.6" text-anchor="middle" dominant-baseline="middle">P bit clear?</text>
  <text class="muted" x="430.0" y="432.6" text-anchor="middle" dominant-baseline="middle">missing translation</text>
  <rect class="green" x="68.0" y="394.28" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="162.1" y="416.6" text-anchor="middle" dominant-baseline="middle">heap or stack page</text>
  <text class="muted" x="162.1" y="432.6" text-anchor="middle" dominant-baseline="middle">allocate and retry</text>
  <rect class="amber" x="335.88" y="524.76" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="430.0" y="547.0" text-anchor="middle" dominant-baseline="middle">P=1, W=1, PG_COW?</text>
  <text class="muted" x="430.0" y="563.0" text-anchor="middle" dominant-baseline="middle">present write case</text>
  <rect class="green" x="68.0" y="524.76" width="188.24" height="60.580000000000005" rx="7"/>
  <text class="label" x="162.1" y="539.0" text-anchor="middle" dominant-baseline="middle">resolve fault</text>
  <text class="muted" x="162.1" y="555.0" text-anchor="middle" dominant-baseline="middle">promote or copy, then</text>
  <text class="muted" x="162.1" y="571.0" text-anchor="middle" dominant-baseline="middle">retry</text>
  <rect class="gray" x="639.96" y="524.76" width="130.32" height="60.580000000000005" rx="7"/>
  <text class="label" x="705.1" y="539.0" text-anchor="middle" dominant-baseline="middle">SIGSEGV</text>
  <text class="muted" x="705.1" y="555.0" text-anchor="middle" dominant-baseline="middle">unrecoverable</text>
  <text class="muted" x="705.1" y="571.0" text-anchor="middle" dominant-baseline="middle">user fault</text>
  <polyline class="arrow" points="430.0,205.9 430.0,251.8" fill="none"/>
  <polyline class="arrow" points="524.1,294.1 640.0,294.1" fill="none"/>
  <rect class="edge-label-bg" x="566.4" y="268.1" width="31.2" height="18" rx="6"/>
  <text class="muted" x="582.04" y="280.09" text-anchor="middle">U=0</text>
  <polyline class="arrow" points="430.0,336.4 430.0,382.3" fill="none"/>
  <rect class="edge-label-bg" x="441.0" y="351.3" width="31.2" height="18" rx="6"/>
  <text class="muted" x="446.0" y="363.3299999999999" text-anchor="start">U=1</text>
  <polyline class="arrow" points="335.9,424.6 256.2,424.6" fill="none"/>
  <rect class="edge-label-bg" x="280.5" y="398.6" width="31.2" height="18" rx="6"/>
  <text class="muted" x="296.06" y="410.57" text-anchor="middle">P=0</text>
  <polyline class="arrow" points="430.0,466.9 430.0,512.8" fill="none"/>
  <rect class="edge-label-bg" x="441.0" y="481.8" width="31.2" height="18" rx="6"/>
  <text class="muted" x="446.0" y="493.80999999999995" text-anchor="start">P=1</text>
  <polyline class="arrow" points="335.9,555.0 256.2,555.0" fill="none"/>
  <rect class="edge-label-bg" x="280.5" y="529.0" width="31.2" height="18" rx="6"/>
  <text class="muted" x="296.06" y="541.05" text-anchor="middle">yes</text>
  <polyline class="arrow" points="524.1,555.0 640.0,555.0" fill="none"/>
  <rect class="edge-label-bg" x="569.0" y="529.0" width="26.0" height="18" rx="6"/>
  <text class="muted" x="582.04" y="541.05" text-anchor="middle">no</text>
  <text class="muted" x="826.0" y="646.0" text-anchor="end">Chapter 25, Figure 1</text>
</svg>
