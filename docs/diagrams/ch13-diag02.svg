  <rect class="blue" x="67.99999999999999" y="474" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="500.0" text-anchor="middle" dominant-baseline="middle">data blocks</text>
  <text class="muted" x="194.8" y="516.0" text-anchor="middle" dominant-baseline="middle">4 KB blocks of file data</text>
  <text class="muted" x="355.7" y="598.0" text-anchor="end">Chapter 13, Figure 2</text>
