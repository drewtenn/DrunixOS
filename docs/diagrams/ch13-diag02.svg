<svg xmlns="http://www.w3.org/2000/svg" width="389.67999999999995" height="616" viewBox="0 0 389.67999999999995 616" role="img" aria-labelledby="title desc">
  <title id="title">Inode block pointers</title>
  <desc id="desc">Small files use direct block pointers; larger files use lookup tables.</desc>
