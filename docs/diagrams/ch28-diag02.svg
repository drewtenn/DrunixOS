<svg xmlns="http://www.w3.org/2000/svg" width="389.67999999999995" height="632" viewBox="0 0 389.67999999999995 632" role="img" aria-labelledby="title desc">
  <title id="title">Cursor overlay during present</title>
  <desc id="desc">The cursor is never written to either buffer. Each present copies back-buffer pixels to the front, then overlays the cursor sprite where the cursor rect intersects the presented rectangle.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="389.67999999999995" height="632" rx="12"/>
  <text class="title" x="44" y="42">Cursor overlay during present</text>
  <text class="muted" x="44" y="68">The cursor is never written to either buffer.</text>
  <text class="muted" x="44" y="84">Each present copies back-buffer pixels to the</text>
  <text class="muted" x="44" y="100">front, then overlays the cursor sprite where the</text>
  <text class="muted" x="44" y="116">cursor rect intersects the presented rectangle.</text>
  <rect class="panel" x="34" y="146" width="321.67999999999995" height="438" rx="10"/>
  <rect class="blue" x="67.99999999999999" y="172" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="198.0" text-anchor="middle" dominant-baseline="middle">Compositor draws windows</text>
  <text class="muted" x="194.8" y="214.0" text-anchor="middle" dominant-baseline="middle">into back buffer only</text>
  <line class="arrow" x1="194.83999999999997" y1="248" x2="194.83999999999997" y2="266"/>
  <rect class="green" x="67.99999999999999" y="278" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="304.0" text-anchor="middle" dominant-baseline="middle">framebuffer_present_rect</text>
  <text class="muted" x="194.8" y="320.0" text-anchor="middle" dominant-baseline="middle">copy dirty rect to front</text>
  <line class="arrow" x1="194.83999999999997" y1="354" x2="194.83999999999997" y2="372"/>
  <rect class="amber" x="67.99999999999999" y="384" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="410.0" text-anchor="middle" dominant-baseline="middle">Overlay cursor sprite</text>
  <text class="muted" x="194.8" y="426.0" text-anchor="middle" dominant-baseline="middle">for pixels inside cursor rect</text>
  <line class="arrow" x1="194.83999999999997" y1="460" x2="194.83999999999997" y2="478"/>
  <rect class="blue" x="67.99999999999999" y="490" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="516.0" text-anchor="middle" dominant-baseline="middle">Visible framebuffer</text>
  <text class="muted" x="194.8" y="532.0" text-anchor="middle" dominant-baseline="middle">what the user sees</text>
  <text class="muted" x="355.7" y="614.0" text-anchor="end">Chapter 28, Figure 2</text>
</svg>
