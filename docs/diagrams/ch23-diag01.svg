<svg xmlns="http://www.w3.org/2000/svg" width="389.67999999999995" height="738" viewBox="0 0 389.67999999999995 738" role="img" aria-labelledby="title desc">
  <title id="title">Module loading path</title>
  <desc id="desc">The loader reads the relocatable object, builds one runtime image, resolves symbols, applies relocations, and finally runs module_init.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="389.67999999999995" height="738" rx="12"/>
  <text class="title" x="44" y="42">Module loading path</text>
  <text class="muted" x="44" y="68">The loader reads the relocatable object, builds</text>
  <text class="muted" x="44" y="84">one runtime image, resolves symbols, applies</text>
  <text class="muted" x="44" y="100">relocations, and finally runs module_init.</text>
  <rect class="panel" x="34" y="130" width="321.67999999999995" height="560" rx="10"/>
  <rect class="blue" x="67.99999999999999" y="156" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="182.0" text-anchor="middle" dominant-baseline="middle">read ELF object</text>
  <text class="muted" x="194.8" y="198.0" text-anchor="middle" dominant-baseline="middle">module bytes come from DUFS</text>
  <line class="arrow" x1="194.83999999999997" y1="232" x2="194.83999999999997" y2="250"/>
  <rect class="green" x="67.99999999999999" y="262" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="288.0" text-anchor="middle" dominant-baseline="middle">size runtime image</text>
  <text class="muted" x="194.8" y="304.0" text-anchor="middle" dominant-baseline="middle">sum SHF_ALLOC sections</text>
  <line class="arrow" x1="194.83999999999997" y1="338" x2="194.83999999999997" y2="356"/>
  <rect class="amber" x="67.99999999999999" y="368" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="394.0" text-anchor="middle" dominant-baseline="middle">lay out sections</text>
  <text class="muted" x="194.8" y="410.0" text-anchor="middle" dominant-baseline="middle">copy text, data, and zeroed BSS</text>
  <line class="arrow" x1="194.83999999999997" y1="444" x2="194.83999999999997" y2="462"/>
  <rect class="blue" x="67.99999999999999" y="474" width="253.67999999999998" height="84" rx="7"/>
  <text class="label" x="194.8" y="500.0" text-anchor="middle" dominant-baseline="middle">resolve + relocate</text>
  <text class="muted" x="194.8" y="516.0" text-anchor="middle" dominant-baseline="middle">match exports and patch</text>
  <text class="muted" x="194.8" y="532.0" text-anchor="middle" dominant-baseline="middle">references</text>
  <line class="arrow" x1="194.83999999999997" y1="566" x2="194.83999999999997" y2="584"/>
  <rect class="green" x="67.99999999999999" y="596" width="253.67999999999998" height="68" rx="7"/>
  <text class="label" x="194.8" y="622.0" text-anchor="middle" dominant-baseline="middle">call module_init</text>
  <text class="muted" x="194.8" y="638.0" text-anchor="middle" dominant-baseline="middle">module becomes live on success</text>
  <text class="muted" x="355.7" y="720.0" text-anchor="end">Chapter 23, Figure 1</text>
</svg>
