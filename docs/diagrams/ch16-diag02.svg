<svg xmlns="http://www.w3.org/2000/svg" width="482.5" height="1750" viewBox="0 0 482.5 1750" role="img" aria-labelledby="title desc">
  <title id="title">AArch64 syscall trap frame</title>
  <desc id="desc">On syscall entry the exception stub saves the full register file onto the kernel stack; eret restores it on return.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="482.5" height="1750" rx="12"/>
  <text class="title" x="44" y="42">AArch64 syscall trap frame</text>
  <text class="muted" x="44" y="68">On syscall entry the exception stub saves the full register file</text>
  <text class="muted" x="44" y="84">onto the kernel stack; eret restores it on return.</text>
  <rect class="panel" x="34" y="114" width="414.5" height="1588" rx="10"/>
  <text class="muted" x="241.25" y="154" text-anchor="middle">lower addresses (top of frame)</text>
  <rect class="blue" x="68.0" y="162" width="346.5" height="84" rx="7"/>
  <text class="label" x="241.2" y="188.0" text-anchor="middle" dominant-baseline="middle">SPSR_EL1</text>
  <text class="muted" x="241.2" y="204.0" text-anchor="middle" dominant-baseline="middle">saved processor status; encodes EL0 on</text>
  <text class="muted" x="241.2" y="220.0" text-anchor="middle" dominant-baseline="middle">return</text>
  <rect class="blue" x="68.0" y="264" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="290.0" text-anchor="middle" dominant-baseline="middle">ELR_EL1</text>
  <text class="muted" x="241.2" y="306.0" text-anchor="middle" dominant-baseline="middle">return address; instruction after svc #0</text>
  <rect class="green" x="68.0" y="350" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="376.0" text-anchor="middle" dominant-baseline="middle">SP_EL0</text>
  <text class="muted" x="241.2" y="392.0" text-anchor="middle" dominant-baseline="middle">user-mode stack pointer</text>
  <rect class="gray" x="68.0" y="436" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="462.0" text-anchor="middle" dominant-baseline="middle">x30 (LR)</text>
  <text class="muted" x="241.2" y="478.0" text-anchor="middle" dominant-baseline="middle">link register</text>
  <rect class="gray" x="68.0" y="522" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="548.0" text-anchor="middle" dominant-baseline="middle">x29 (FP)</text>
  <text class="muted" x="241.2" y="564.0" text-anchor="middle" dominant-baseline="middle">frame pointer</text>
  <rect class="gray" x="68.0" y="608" width="346.5" height="84" rx="7"/>
  <text class="label" x="241.2" y="634.0" text-anchor="middle" dominant-baseline="middle">x28–x19</text>
  <text class="muted" x="241.2" y="650.0" text-anchor="middle" dominant-baseline="middle">callee-saved general-purpose registers (10</text>
  <text class="muted" x="241.2" y="666.0" text-anchor="middle" dominant-baseline="middle">slots)</text>
  <rect class="gray" x="68.0" y="710" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="736.0" text-anchor="middle" dominant-baseline="middle">x18</text>
  <text class="muted" x="241.2" y="752.0" text-anchor="middle" dominant-baseline="middle">platform register</text>
  <rect class="gray" x="68.0" y="796" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="822.0" text-anchor="middle" dominant-baseline="middle">x17–x16</text>
  <text class="muted" x="241.2" y="838.0" text-anchor="middle" dominant-baseline="middle">inter-procedure-call scratch registers</text>
  <rect class="gray" x="68.0" y="882" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="908.0" text-anchor="middle" dominant-baseline="middle">x15–x9</text>
  <text class="muted" x="241.2" y="924.0" text-anchor="middle" dominant-baseline="middle">caller-saved general-purpose registers</text>
  <rect class="amber" x="68.0" y="968" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="994.0" text-anchor="middle" dominant-baseline="middle">x8</text>
  <text class="muted" x="241.2" y="1010.0" text-anchor="middle" dominant-baseline="middle">syscall number on entry</text>
  <rect class="gray" x="68.0" y="1054" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1080.0" text-anchor="middle" dominant-baseline="middle">x7–x6</text>
  <text class="muted" x="241.2" y="1096.0" text-anchor="middle" dominant-baseline="middle">caller-saved (unused for syscall args)</text>
  <rect class="green" x="68.0" y="1140" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1166.0" text-anchor="middle" dominant-baseline="middle">x5</text>
  <text class="muted" x="241.2" y="1182.0" text-anchor="middle" dominant-baseline="middle">fifth argument</text>
  <rect class="green" x="68.0" y="1226" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1252.0" text-anchor="middle" dominant-baseline="middle">x4</text>
  <text class="muted" x="241.2" y="1268.0" text-anchor="middle" dominant-baseline="middle">fourth argument</text>
  <rect class="green" x="68.0" y="1312" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1338.0" text-anchor="middle" dominant-baseline="middle">x3</text>
  <text class="muted" x="241.2" y="1354.0" text-anchor="middle" dominant-baseline="middle">third argument</text>
  <rect class="green" x="68.0" y="1398" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1424.0" text-anchor="middle" dominant-baseline="middle">x2</text>
  <text class="muted" x="241.2" y="1440.0" text-anchor="middle" dominant-baseline="middle">second argument</text>
  <rect class="green" x="68.0" y="1484" width="346.5" height="68" rx="7"/>
  <text class="label" x="241.2" y="1510.0" text-anchor="middle" dominant-baseline="middle">x1</text>
  <text class="muted" x="241.2" y="1526.0" text-anchor="middle" dominant-baseline="middle">first argument</text>
  <rect class="amber" x="68.0" y="1570" width="346.5" height="84" rx="7"/>
  <text class="label" x="241.2" y="1596.0" text-anchor="middle" dominant-baseline="middle">x0</text>
  <text class="muted" x="241.2" y="1612.0" text-anchor="middle" dominant-baseline="middle">first argument on entry; return value on</text>
  <text class="muted" x="241.2" y="1628.0" text-anchor="middle" dominant-baseline="middle">exit</text>
  <text class="muted" x="241.25" y="1670" text-anchor="middle">higher addresses (frame base)</text>
  <text class="muted" x="448.5" y="1732.0" text-anchor="end">Chapter 16, Figure 2</text>
</svg>
