<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680" role="img" aria-labelledby="title desc">
  <title id="title">Terminal read behavior</title>
  <desc id="desc">A terminal read branches on the active input mode and on whether enough buffered input is already available.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="820" height="680" rx="12"/>
  <text class="title" x="44" y="42">Terminal read behavior</text>
  <text class="muted" x="44" y="68">A terminal read branches on the active input mode and on whether enough buffered input is already available.</text>
  <rect class="panel" x="34" y="98" width="752" height="534" rx="10"/>
  <rect class="blue" x="307.4" y="133.64" width="205.2" height="53.02" rx="7"/>
  <text class="label" x="410.0" y="152.1" text-anchor="middle" dominant-baseline="middle">read request</text>
  <text class="muted" x="410.0" y="168.1" text-anchor="middle" dominant-baseline="middle">fd and user buffer</text>
  <rect class="amber" x="307.4" y="239.68" width="205.2" height="53.02" rx="7"/>
  <text class="label" x="410.0" y="258.2" text-anchor="middle" dominant-baseline="middle">canonical mode?</text>
  <text class="muted" x="410.0" y="274.2" text-anchor="middle" dominant-baseline="middle">line discipline check</text>
  <rect class="amber" x="68.0" y="355.36" width="184.68" height="53.02" rx="7"/>
  <text class="label" x="160.3" y="373.9" text-anchor="middle" dominant-baseline="middle">full line ready?</text>
  <text class="muted" x="160.3" y="389.9" text-anchor="middle" dominant-baseline="middle">canonical buffer check</text>
  <rect class="amber" x="567.3199999999999" y="355.36" width="184.68" height="53.02" rx="7"/>
  <text class="label" x="659.7" y="373.9" text-anchor="middle" dominant-baseline="middle">raw bytes ready?</text>
  <text class="muted" x="659.7" y="389.9" text-anchor="middle" dominant-baseline="middle">byte-availability check</text>
  <rect class="gray" x="307.4" y="471.03999999999996" width="205.2" height="53.02" rx="7"/>
  <text class="label" x="410.0" y="481.5" text-anchor="middle" dominant-baseline="middle">sleep for input</text>
  <text class="muted" x="410.0" y="497.5" text-anchor="middle" dominant-baseline="middle">block until input wakes</text>
  <text class="muted" x="410.0" y="513.5" text-anchor="middle" dominant-baseline="middle">the reader</text>
  <rect class="green" x="68.0" y="548.1600000000001" width="184.68" height="53.02" rx="7"/>
  <text class="label" x="160.3" y="566.7" text-anchor="middle" dominant-baseline="middle">copy line</text>
  <text class="muted" x="160.3" y="582.7" text-anchor="middle" dominant-baseline="middle">return completed line</text>
  <rect class="green" x="567.3199999999999" y="548.1600000000001" width="184.68" height="53.02" rx="7"/>
  <text class="label" x="659.7" y="566.7" text-anchor="middle" dominant-baseline="middle">copy bytes</text>
  <text class="muted" x="659.7" y="582.7" text-anchor="middle" dominant-baseline="middle">return available bytes</text>
  <polyline class="arrow" points="410.0,198.7 410.0,227.7" fill="none"/>
  <polyline class="arrow" points="295.4,266.2 160.3,266.2 160.3,343.4" fill="none"/>
  <rect class="edge-label-bg" x="212.3" y="240.2" width="31.2" height="18" rx="6"/>
  <text class="muted" x="227.87" y="252.19" text-anchor="middle">yes</text>
  <polyline class="arrow" points="524.6,266.2 659.7,266.2 659.7,343.4" fill="none"/>
  <rect class="edge-label-bg" x="579.1" y="240.2" width="26.0" height="18" rx="6"/>
  <text class="muted" x="592.1299999999999" y="252.19" text-anchor="middle">no</text>
  <polyline class="arrow" points="160.3,420.4 160.3,536.2" fill="none"/>
  <rect class="edge-label-bg" x="171.3" y="470.3" width="31.2" height="18" rx="6"/>
  <text class="muted" x="176.34" y="482.27000000000004" text-anchor="start">yes</text>
  <polyline class="arrow" points="264.7,381.9 410.0,381.9 410.0,459.0" fill="none"/>
  <rect class="edge-label-bg" x="324.3" y="355.9" width="26.0" height="18" rx="6"/>
  <text class="muted" x="337.34000000000003" y="367.87" text-anchor="middle">no</text>
  <polyline class="arrow" points="659.7,420.4 659.7,536.2" fill="none"/>
  <rect class="edge-label-bg" x="670.7" y="470.3" width="31.2" height="18" rx="6"/>
  <text class="muted" x="675.66" y="482.27000000000004" text-anchor="start">yes</text>
  <polyline class="arrow" points="555.3,381.9 410.0,381.9 410.0,459.0" fill="none"/>
  <rect class="edge-label-bg" x="469.7" y="355.9" width="26.0" height="18" rx="6"/>
  <text class="muted" x="482.65999999999997" y="367.87" text-anchor="middle">no</text>
  <text class="muted" x="786.0" y="662.0" text-anchor="end">Chapter 18, Figure 2</text>
</svg>
