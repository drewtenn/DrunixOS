<svg xmlns="http://www.w3.org/2000/svg" width="346.0" height="744" viewBox="0 0 346.0 744" role="img" aria-labelledby="title desc">
  <title id="title">File operation stack</title>
  <desc id="desc">A file call descends through a fixed layer stack from user space to the disk driver.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="346.0" height="744" rx="12"/>
  <text class="title" x="44" y="42">File operation stack</text>
  <text class="muted" x="44" y="68">A file call descends through a fixed layer</text>
  <text class="muted" x="44" y="84">stack from user space to the disk driver.</text>
  <rect class="panel" x="34" y="114" width="278.0" height="582" rx="10"/>
  <rect class="blue" x="68.0" y="140" width="210.0" height="84" rx="7"/>
  <text class="label" x="173.0" y="166.0" text-anchor="middle" dominant-baseline="middle">User program</text>
  <text class="muted" x="173.0" y="182.0" text-anchor="middle" dominant-baseline="middle">read, write, or open</text>
  <text class="muted" x="173.0" y="198.0" text-anchor="middle" dominant-baseline="middle">request</text>
  <rect class="green" x="68.0" y="242" width="210.0" height="84" rx="7"/>
  <text class="label" x="173.0" y="268.0" text-anchor="middle" dominant-baseline="middle">Kernel entry layer</text>
  <text class="muted" x="173.0" y="284.0" text-anchor="middle" dominant-baseline="middle">fd checks and syscall</text>
  <text class="muted" x="173.0" y="300.0" text-anchor="middle" dominant-baseline="middle">entry</text>
  <rect class="amber" x="68.0" y="344" width="210.0" height="68" rx="7"/>
  <text class="label" x="173.0" y="370.0" text-anchor="middle" dominant-baseline="middle">VFS router</text>
  <text class="muted" x="173.0" y="386.0" text-anchor="middle" dominant-baseline="middle">choose the owning backend</text>
  <rect class="blue" x="68.0" y="430" width="210.0" height="68" rx="7"/>
  <text class="label" x="173.0" y="456.0" text-anchor="middle" dominant-baseline="middle">Filesystem implementation</text>
  <text class="muted" x="173.0" y="472.0" text-anchor="middle" dominant-baseline="middle">inode and directory logic</text>
  <rect class="green" x="68.0" y="516" width="210.0" height="68" rx="7"/>
  <text class="label" x="173.0" y="542.0" text-anchor="middle" dominant-baseline="middle">Disk I/O layer</text>
  <text class="muted" x="173.0" y="558.0" text-anchor="middle" dominant-baseline="middle">sector-sized requests</text>
  <rect class="gray" x="68.0" y="602" width="210.0" height="68" rx="7"/>
  <text class="label" x="173.0" y="628.0" text-anchor="middle" dominant-baseline="middle">Disk driver</text>
  <text class="muted" x="173.0" y="644.0" text-anchor="middle" dominant-baseline="middle">talk to hardware</text>
  <text class="muted" x="312.0" y="726.0" text-anchor="end">Chapter 14, Figure 1</text>
</svg>
