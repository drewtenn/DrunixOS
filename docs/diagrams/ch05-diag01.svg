<svg xmlns="http://www.w3.org/2000/svg" width="391.5" height="722" viewBox="0 0 391.5 722" role="img" aria-labelledby="title desc">
  <title id="title">Interrupt dispatch path</title>
  <desc id="desc">A hardware interrupt is turned into a driver callback inside the kernel.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="391.5" height="722" rx="12"/>
  <text class="title" x="44" y="42">Interrupt dispatch path</text>
  <text class="muted" x="44" y="68">A hardware interrupt is turned into a driver</text>
  <text class="muted" x="44" y="84">callback inside the kernel.</text>
  <rect class="panel" x="34" y="114" width="323.5" height="560" rx="10"/>
  <rect class="blue" x="68.0" y="140" width="255.5" height="68" rx="7"/>
  <text class="label" x="195.8" y="166.0" text-anchor="middle" dominant-baseline="middle">Device interrupt</text>
  <text class="muted" x="195.8" y="182.0" text-anchor="middle" dominant-baseline="middle">Timer or keyboard event</text>
  <line class="arrow" x1="195.75" y1="216" x2="195.75" y2="234"/>
  <rect class="green" x="68.0" y="246" width="255.5" height="68" rx="7"/>
  <text class="label" x="195.8" y="272.0" text-anchor="middle" dominant-baseline="middle">Interrupt controller</text>
  <text class="muted" x="195.8" y="288.0" text-anchor="middle" dominant-baseline="middle">CPU vector assignment</text>
  <line class="arrow" x1="195.75" y1="322" x2="195.75" y2="340"/>
  <rect class="amber" x="68.0" y="352" width="255.5" height="84" rx="7"/>
  <text class="label" x="195.8" y="378.0" text-anchor="middle" dominant-baseline="middle">IRQ trampoline</text>
  <text class="muted" x="195.8" y="394.0" text-anchor="middle" dominant-baseline="middle">Saved registers and interrupt</text>
  <text class="muted" x="195.8" y="410.0" text-anchor="middle" dominant-baseline="middle">frame</text>
  <line class="arrow" x1="195.75" y1="444" x2="195.75" y2="462"/>
  <rect class="blue" x="68.0" y="474" width="255.5" height="68" rx="7"/>
  <text class="label" x="195.8" y="500.0" text-anchor="middle" dominant-baseline="middle">Interrupt dispatcher</text>
  <text class="muted" x="195.8" y="516.0" text-anchor="middle" dominant-baseline="middle">Handler lookup and EOI</text>
  <line class="arrow" x1="195.75" y1="550" x2="195.75" y2="568"/>
  <rect class="green" x="68.0" y="580" width="255.5" height="68" rx="7"/>
  <text class="label" x="195.8" y="606.0" text-anchor="middle" dominant-baseline="middle">Driver callback</text>
  <text class="muted" x="195.8" y="622.0" text-anchor="middle" dominant-baseline="middle">Device-specific handler code</text>
  <text class="muted" x="357.5" y="704.0" text-anchor="end">Chapter 5, Figure 1</text>
</svg>
