  <rect class="bg" x="0" y="0" width="463.0" height="674" rx="12"/>
  <text class="title" x="44" y="42">Initial user stack</text>
  <text class="muted" x="44" y="68">The kernel builds argument strings, pointer arrays, and the</text>
  <text class="muted" x="44" y="84">initial stack values.</text>
  <rect class="panel" x="34" y="114" width="395.0" height="512" rx="10"/>
  <rect class="green" x="68.0" y="140" width="327.0" height="84" rx="7"/>
  <text class="label" x="231.5" y="166.0" text-anchor="middle" dominant-baseline="middle">environment text</text>
  <text class="muted" x="231.5" y="182.0" text-anchor="middle" dominant-baseline="middle">environment variable strings at high</text>
  <text class="muted" x="231.5" y="198.0" text-anchor="middle" dominant-baseline="middle">addresses</text>
  <rect class="green" x="68.0" y="242" width="327.0" height="84" rx="7"/>
  <text class="label" x="231.5" y="268.0" text-anchor="middle" dominant-baseline="middle">argument text</text>
  <text class="muted" x="231.5" y="284.0" text-anchor="middle" dominant-baseline="middle">program argument strings stored below</text>
  <text class="muted" x="231.5" y="300.0" text-anchor="middle" dominant-baseline="middle">them</text>
