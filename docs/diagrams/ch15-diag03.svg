<svg xmlns="http://www.w3.org/2000/svg" width="463.0" height="674" viewBox="0 0 463.0 674" role="img" aria-labelledby="title desc">
  <title id="title">Initial user stack</title>
  <desc id="desc">The kernel builds argument strings, pointer arrays, and the initial stack values.</desc>
