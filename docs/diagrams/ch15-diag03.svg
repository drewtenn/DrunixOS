  <text class="muted" x="231.5" y="386.0" text-anchor="middle" dominant-baseline="middle">envp array pointing at environment</text>
  <text class="muted" x="231.5" y="402.0" text-anchor="middle" dominant-baseline="middle">strings</text>
  <rect class="blue" x="68.0" y="446" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="472.0" text-anchor="middle" dominant-baseline="middle">argument pointers</text>
  <text class="muted" x="231.5" y="488.0" text-anchor="middle" dominant-baseline="middle">argv array pointing at argument strings</text>
  <rect class="amber" x="68.0" y="532" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="558.0" text-anchor="middle" dominant-baseline="middle">entry values</text>
  <text class="muted" x="231.5" y="574.0" text-anchor="middle" dominant-baseline="middle">argument count and initial stack pointer</text>
  <text class="muted" x="429.0" y="656.0" text-anchor="end">Chapter 15, Figure 3</text>
