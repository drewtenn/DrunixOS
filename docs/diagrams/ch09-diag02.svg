<svg xmlns="http://www.w3.org/2000/svg" width="488" height="484" viewBox="0 0 488 484" role="img" aria-labelledby="title desc">
  <title id="title">Typical boot log</title>
  <desc id="desc">Startup reads as a structured transcript of subsystem initialization, with one tagged line per subsystem event.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="488" height="484" rx="12"/>
  <text class="title" x="44" y="42">Typical boot log</text>
  <text class="muted" x="44" y="68">Startup reads as a structured transcript of subsystem</text>
  <text class="muted" x="44" y="84">initialization, with one tagged line per subsystem event.</text>
  <rect class="panel" x="34" y="114" width="420" height="322" rx="10"/>
  <text class="colhead" x="68" y="142" text-anchor="start">tag</text>
  <text class="colhead" x="173" y="142" text-anchor="start">message</text>
  <rect class="tag" x="68.0" y="168.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="181.0" text-anchor="middle">MEM</text>
  <text class="small" x="173" y="181.0" text-anchor="start">boot memory map found</text>
  <rect class="tag" x="68.0" y="200.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="213.0" text-anchor="middle">MEM</text>
  <text class="small" x="173" y="213.0" text-anchor="start">free pages: 31500</text>
  <rect class="tag" x="68.0" y="232.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="245.0" text-anchor="middle">CPU</text>
  <text class="small" x="173" y="245.0" text-anchor="start">user-mode entry state installed</text>
  <rect class="tag" x="68.0" y="264.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="277.0" text-anchor="middle">DISK</text>
  <text class="small" x="173" y="277.0" text-anchor="start">disk initialized</text>
  <rect class="tag" x="68.0" y="296.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="309.0" text-anchor="middle">TRAPS</text>
  <text class="small" x="173" y="309.0" text-anchor="start">interrupts enabled</text>
  <rect class="tag" x="68.0" y="328.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="341.0" text-anchor="middle">FILES</text>
  <text class="small" x="173" y="341.0" text-anchor="start">filesystem mounted</text>
  <rect class="tag" x="68.0" y="360.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="373.0" text-anchor="middle">FILES</text>
  <text class="small" x="173" y="373.0" text-anchor="start">shell program located</text>
  <rect class="tag" x="68.0" y="392.0" width="81.0" height="18.0" rx="6"/>
  <text class="small" x="108.5" y="405.0" text-anchor="middle">PROCESS</text>
  <text class="small" x="173" y="405.0" text-anchor="start">entering user mode</text>
  <text class="muted" x="454.0" y="466.0" text-anchor="end">Chapter 9, Figure 2</text>
</svg>
