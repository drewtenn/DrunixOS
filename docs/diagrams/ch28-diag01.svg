<svg xmlns="http://www.w3.org/2000/svg" width="839.0" height="424" viewBox="0 0 839.0 424" role="img" aria-labelledby="title desc">
  <title id="title">Two display modes share one compositor</title>
  <desc id="desc">Above the display layer the desktop is mode-oblivious; only the bottom-most present step knows whether it is writing to VGA text memory or rasterising into a pixel back buffer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="839.0" height="424" rx="12"/>
  <text class="title" x="44" y="42">Two display modes share one compositor</text>
  <text class="muted" x="44" y="68">Above the display layer the desktop is mode-oblivious; only the bottom-most present step knows whether it is writing to</text>
  <text class="muted" x="44" y="84">VGA text memory or rasterising into a pixel back buffer.</text>
  <rect class="panel" x="34" y="114" width="771.0" height="262" rx="10"/>
  <text class="label" x="68" y="186.0" text-anchor="start">VGA text</text>
  <rect class="blue" x="179.2" y="140" width="263.9222222222222" height="84" rx="7"/>
  <text class="label" x="311.2" y="174.0" text-anchor="middle" dominant-baseline="middle">Cell grid</text>
  <text class="muted" x="311.2" y="190.0" text-anchor="middle" dominant-baseline="middle">character + attribute</text>
  <rect class="green" x="453.1222222222222" y="140" width="317.87777777777774" height="84" rx="7"/>
  <text class="label" x="612.1" y="174.0" text-anchor="middle" dominant-baseline="middle">Direct write to 0xB8000</text>
  <text class="muted" x="612.1" y="190.0" text-anchor="middle" dominant-baseline="middle">one cell per 16 bits</text>
  <text class="label" x="68" y="312.0" text-anchor="start">Framebuffer</text>
  <rect class="blue" x="179.2" y="266" width="164.5" height="84" rx="7"/>
  <text class="label" x="261.4" y="292.0" text-anchor="middle" dominant-baseline="middle">Cell grid</text>
  <text class="muted" x="261.4" y="308.0" text-anchor="middle" dominant-baseline="middle">character +</text>
  <text class="muted" x="261.4" y="324.0" text-anchor="middle" dominant-baseline="middle">attribute</text>
  <rect class="amber" x="353.7" y="266" width="164.8" height="84" rx="7"/>
  <text class="label" x="436.1" y="300.0" text-anchor="middle" dominant-baseline="middle">Glyph rasterisation</text>
  <text class="muted" x="436.1" y="316.0" text-anchor="middle" dominant-baseline="middle">8x16 bitmap per cell</text>
  <rect class="green" x="528.5" y="266" width="242.5" height="84" rx="7"/>
  <text class="label" x="649.8" y="292.0" text-anchor="middle" dominant-baseline="middle">Back buffer + present</text>
  <text class="muted" x="649.8" y="308.0" text-anchor="middle" dominant-baseline="middle">dirty rect to visible</text>
  <text class="muted" x="649.8" y="324.0" text-anchor="middle" dominant-baseline="middle">framebuffer</text>
  <text class="muted" x="805.0" y="406.0" text-anchor="end">Chapter 28, Figure 1</text>
</svg>
