<svg xmlns="http://www.w3.org/2000/svg" width="751.5" height="432" viewBox="0 0 751.5 432" role="img" aria-labelledby="title desc">
  <title id="title">RTC seed and PIT upkeep</title>
  <desc id="desc">Boot reads the hardware clock once; runtime keeps time by counting timer ticks.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="751.5" height="432" rx="12"/>
  <text class="title" x="44" y="42">RTC seed and PIT upkeep</text>
  <text class="muted" x="44" y="68">Boot reads the hardware clock once; runtime keeps time by counting timer ticks.</text>
  <rect class="panel" x="34" y="98" width="683.5" height="286" rx="10"/>
  <text class="label" x="68.0" y="170.0" text-anchor="start">Boot</text>
  <rect class="blue" x="145.5" y="124" width="150" height="84" rx="7"/>
  <text class="label" x="220.5" y="150.0" text-anchor="middle" dominant-baseline="middle">Read RTC</text>
  <text class="muted" x="220.5" y="166.0" text-anchor="middle" dominant-baseline="middle">stable calendar</text>
  <text class="muted" x="220.5" y="182.0" text-anchor="middle" dominant-baseline="middle">sample</text>
  <line class="arrow" x1="303.5" y1="166.0" x2="327.5" y2="166.0"/>
  <rect class="green" x="339.5" y="124" width="150" height="84" rx="7"/>
  <text class="label" x="414.5" y="150.0" text-anchor="middle" dominant-baseline="middle">Decode fields</text>
  <text class="muted" x="414.5" y="166.0" text-anchor="middle" dominant-baseline="middle">convert from BCD</text>
  <text class="muted" x="414.5" y="182.0" text-anchor="middle" dominant-baseline="middle">if needed</text>
  <line class="arrow" x1="497.5" y1="166.0" x2="521.5" y2="166.0"/>
  <rect class="amber" x="533.5" y="124" width="150" height="84" rx="7"/>
  <text class="label" x="608.5" y="150.0" text-anchor="middle" dominant-baseline="middle">Seed Unix time</text>
  <text class="muted" x="608.5" y="166.0" text-anchor="middle" dominant-baseline="middle">initial seconds</text>
  <text class="muted" x="608.5" y="182.0" text-anchor="middle" dominant-baseline="middle">counter</text>
  <text class="label" x="68.0" y="296.0" text-anchor="start">Runtime</text>
  <rect class="blue" x="145.5" y="250" width="150" height="84" rx="7"/>
  <text class="label" x="220.5" y="284.0" text-anchor="middle" dominant-baseline="middle">Timer tick</text>
  <text class="muted" x="220.5" y="300.0" text-anchor="middle" dominant-baseline="middle">100 Hz IRQ 0</text>
  <line class="arrow" x1="303.5" y1="292.0" x2="327.5" y2="292.0"/>
  <rect class="green" x="339.5" y="250" width="150" height="84" rx="7"/>
  <text class="label" x="414.5" y="276.0" text-anchor="middle" dominant-baseline="middle">Count to 100</text>
  <text class="muted" x="414.5" y="292.0" text-anchor="middle" dominant-baseline="middle">subsecond</text>
  <text class="muted" x="414.5" y="308.0" text-anchor="middle" dominant-baseline="middle">accumulator</text>
  <line class="arrow" x1="497.5" y1="292.0" x2="521.5" y2="292.0"/>
  <rect class="amber" x="533.5" y="250" width="150" height="84" rx="7"/>
  <text class="label" x="608.5" y="284.0" text-anchor="middle" dominant-baseline="middle">Add one second</text>
  <text class="muted" x="608.5" y="300.0" text-anchor="middle" dominant-baseline="middle">advance Unix time</text>
  <text class="muted" x="717.5" y="414.0" text-anchor="end">Chapter 5, Figure 2</text>
</svg>
