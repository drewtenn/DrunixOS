<svg xmlns="http://www.w3.org/2000/svg" width="463.0" height="728" viewBox="0 0 463.0 728" role="img" aria-labelledby="title desc">
  <title id="title">Physical memory map</title>
  <desc id="desc">Low memory is carved up before the page allocator manages extended RAM.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="463.0" height="728" rx="12"/>
  <text class="title" x="44" y="42">Physical memory map</text>
  <text class="muted" x="44" y="68">Low memory is carved up before the page allocator manages</text>
  <text class="muted" x="44" y="84">extended RAM.</text>
  <rect class="panel" x="34" y="114" width="395.0" height="566" rx="10"/>
  <rect class="green" x="68.0" y="140" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="166.0" text-anchor="middle" dominant-baseline="middle">extended RAM</text>
  <text class="muted" x="231.5" y="182.0" text-anchor="middle" dominant-baseline="middle">managed by the page allocator</text>
  <rect class="blue" x="68.0" y="226" width="327.0" height="84" rx="7"/>
  <text class="label" x="231.5" y="252.0" text-anchor="middle" dominant-baseline="middle">kernel image + BSS</text>
  <text class="muted" x="231.5" y="268.0" text-anchor="middle" dominant-baseline="middle">kernel code, data, page bitmap, and boot</text>
  <text class="muted" x="231.5" y="284.0" text-anchor="middle" dominant-baseline="middle">stack</text>
  <rect class="gray" x="68.0" y="328" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="354.0" text-anchor="middle" dominant-baseline="middle">video + firmware area</text>
  <text class="muted" x="231.5" y="370.0" text-anchor="middle" dominant-baseline="middle">reserved</text>
  <rect class="green" x="68.0" y="414" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="440.0" text-anchor="middle" dominant-baseline="middle">kernel heap</text>
  <text class="muted" x="231.5" y="456.0" text-anchor="middle" dominant-baseline="middle">0x32000-0x8FFFF</text>
  <rect class="blue" x="68.0" y="500" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="526.0" text-anchor="middle" dominant-baseline="middle">early page maps</text>
  <text class="muted" x="231.5" y="542.0" text-anchor="middle" dominant-baseline="middle">identity-mapped paging structures</text>
  <rect class="gray" x="68.0" y="586" width="327.0" height="68" rx="7"/>
  <text class="label" x="231.5" y="612.0" text-anchor="middle" dominant-baseline="middle">firmware tables</text>
  <text class="muted" x="231.5" y="628.0" text-anchor="middle" dominant-baseline="middle">reserved low memory</text>
  <text class="muted" x="429.0" y="710.0" text-anchor="end">Chapter 8, Figure 1</text>
</svg>
