<svg xmlns="http://www.w3.org/2000/svg" width="764" height="298" viewBox="0 0 764 298" role="img" aria-labelledby="title desc">
  <title id="title">Demand paging installs the missing PTE</title>
  <desc id="desc">brk() reserves the virtual range first; the first touch is what allocates and maps the physical page.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="764" height="298" rx="12"/>
  <text class="title" x="44" y="42">Demand paging installs the missing PTE</text>
  <text class="muted" x="44" y="68">brk() reserves the virtual range first; the first touch is what allocates and maps the physical page.</text>
  <rect class="panel" x="34" y="98" width="696" height="152" rx="10"/>
  <rect class="gray" x="68.0" y="124" width="180" height="100" rx="7"/>
  <text class="label" x="158.0" y="150.0" text-anchor="middle" dominant-baseline="middle">before first touch</text>
  <text class="muted" x="158.0" y="166.0" text-anchor="middle" dominant-baseline="middle">break moved forward,</text>
  <text class="muted" x="158.0" y="182.0" text-anchor="middle" dominant-baseline="middle">but the PTE is not</text>
  <text class="muted" x="158.0" y="198.0" text-anchor="middle" dominant-baseline="middle">present</text>
  <line class="arrow" x1="256.0" y1="174.0" x2="280.0" y2="174.0"/>
  <rect class="amber" x="292.0" y="124" width="180" height="100" rx="7"/>
  <text class="label" x="382.0" y="150.0" text-anchor="middle" dominant-baseline="middle">fault path</text>
  <text class="muted" x="382.0" y="166.0" text-anchor="middle" dominant-baseline="middle">CPU records CR2,</text>
  <text class="muted" x="382.0" y="182.0" text-anchor="middle" dominant-baseline="middle">kernel allocates and</text>
  <text class="muted" x="382.0" y="198.0" text-anchor="middle" dominant-baseline="middle">zeroes one page</text>
  <line class="arrow" x1="480.0" y1="174.0" x2="504.0" y2="174.0"/>
  <rect class="green" x="516.0" y="124" width="180" height="100" rx="7"/>
  <text class="label" x="606.0" y="150.0" text-anchor="middle" dominant-baseline="middle">after retry</text>
  <text class="muted" x="606.0" y="166.0" text-anchor="middle" dominant-baseline="middle">PTE is present and</text>
  <text class="muted" x="606.0" y="182.0" text-anchor="middle" dominant-baseline="middle">user-writable, so the</text>
  <text class="muted" x="606.0" y="198.0" text-anchor="middle" dominant-baseline="middle">instruction succeeds</text>
  <text class="muted" x="730.0" y="280.0" text-anchor="end">Chapter 25, Figure 2</text>
</svg>
