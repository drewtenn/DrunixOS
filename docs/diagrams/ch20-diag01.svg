<svg xmlns="http://www.w3.org/2000/svg" width="828" height="314" viewBox="0 0 828 314" role="img" aria-labelledby="title desc">
  <title id="title">User runtime entry</title>
  <desc id="desc">The kernel prepares the initial stack, _start turns that frame into a C call to main, and the return value flows to exit.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="828" height="314" rx="12"/>
  <text class="title" x="44" y="42">User runtime entry</text>
  <text class="muted" x="44" y="68">The kernel prepares the initial stack, _start turns that frame into a C call to main, and the return value flows to</text>
  <text class="muted" x="44" y="84">exit.</text>
  <rect class="panel" x="34" y="114" width="760" height="152" rx="10"/>
  <rect class="blue" x="68.0" y="140" width="140" height="100" rx="7"/>
  <text class="label-tight" x="138.0" y="166.0" text-anchor="middle" dominant-baseline="middle">initial user stack</text>
  <text class="muted" x="138.0" y="182.0" text-anchor="middle" dominant-baseline="middle">kernel writes</text>
  <text class="muted" x="138.0" y="198.0" text-anchor="middle" dominant-baseline="middle">argc, argv, and</text>
  <text class="muted" x="138.0" y="214.0" text-anchor="middle" dominant-baseline="middle">envp</text>
  <line class="arrow" x1="216.0" y1="190.0" x2="240.0" y2="190.0"/>
  <rect class="green" x="252.0" y="140" width="140" height="100" rx="7"/>
  <text class="label" x="322.0" y="174.0" text-anchor="middle" dominant-baseline="middle">_start</text>
  <text class="muted" x="322.0" y="190.0" text-anchor="middle" dominant-baseline="middle">store environ,</text>
  <text class="muted" x="322.0" y="206.0" text-anchor="middle" dominant-baseline="middle">then call main</text>
  <line class="arrow" x1="400.0" y1="190.0" x2="424.0" y2="190.0"/>
  <rect class="amber" x="436.0" y="140" width="140" height="100" rx="7"/>
  <text class="label-micro" x="506.0" y="182.0" text-anchor="middle" dominant-baseline="middle">main(argc, argv, envp)</text>
  <text class="muted" x="506.0" y="198.0" text-anchor="middle" dominant-baseline="middle">run user code</text>
  <line class="arrow" x1="584.0" y1="190.0" x2="608.0" y2="190.0"/>
  <rect class="blue" x="620.0" y="140" width="140" height="100" rx="7"/>
  <text class="label" x="690.0" y="166.0" text-anchor="middle" dominant-baseline="middle">sys_exit(ret)</text>
  <text class="muted" x="690.0" y="182.0" text-anchor="middle" dominant-baseline="middle">return main's</text>
  <text class="muted" x="690.0" y="198.0" text-anchor="middle" dominant-baseline="middle">value to the</text>
  <text class="muted" x="690.0" y="214.0" text-anchor="middle" dominant-baseline="middle">kernel</text>
  <text class="muted" x="794.0" y="296.0" text-anchor="end">Chapter 20, Figure 1</text>
</svg>
