<svg xmlns="http://www.w3.org/2000/svg" width="424.0" height="606" viewBox="0 0 424.0 606" role="img" aria-labelledby="title desc">
  <title id="title">Slab page layout</title>
  <desc id="desc">Each slab page starts with metadata, then packs fixed-size object slots.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="424.0" height="606" rx="12"/>
  <text class="title" x="44" y="42">Slab page layout</text>
  <text class="muted" x="44" y="68">Each slab page starts with metadata, then packs fixed-</text>
  <text class="muted" x="44" y="84">size object slots.</text>
  <rect class="panel" x="34" y="114" width="356.0" height="444" rx="10"/>
  <rect class="blue" x="68.0" y="140" width="288.0" height="84" rx="7"/>
  <text class="label" x="212.0" y="166.0" text-anchor="middle" dominant-baseline="middle">page header</text>
  <text class="muted" x="212.0" y="182.0" text-anchor="middle" dominant-baseline="middle">next pointer, free count, free-list</text>
  <text class="muted" x="212.0" y="198.0" text-anchor="middle" dominant-baseline="middle">head</text>
  <rect class="green" x="68.0" y="242" width="288.0" height="56" rx="7"/>
  <text class="label" x="212.0" y="270.0" text-anchor="middle" dominant-baseline="middle">object slot 0</text>
  <rect class="green" x="68.0" y="316" width="288.0" height="56" rx="7"/>
  <text class="label" x="212.0" y="344.0" text-anchor="middle" dominant-baseline="middle">object slot 1</text>
  <rect class="green" x="68.0" y="390" width="288.0" height="56" rx="7"/>
  <text class="label" x="212.0" y="418.0" text-anchor="middle" dominant-baseline="middle">more object slots</text>
  <rect class="gray" x="68.0" y="464" width="288.0" height="68" rx="7"/>
  <text class="label" x="212.0" y="490.0" text-anchor="middle" dominant-baseline="middle">unused padding</text>
  <text class="muted" x="212.0" y="506.0" text-anchor="middle" dominant-baseline="middle">space smaller than one full object</text>
  <text class="muted" x="390.0" y="588.0" text-anchor="end">Chapter 8, Figure 6</text>
</svg>
