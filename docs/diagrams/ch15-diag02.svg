<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">Process state machine</title>
  <desc id="desc">Processes move between ready, running, blocked, zombie, and unused states as the scheduler and syscalls act on them.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="820" height="520" rx="12"/>
  <text class="title" x="44" y="42">Process state machine</text>
  <text class="muted" x="44" y="68">Processes move between ready, running, blocked, zombie, and unused states as the scheduler and syscalls act on them.</text>
  <rect class="panel" x="34" y="98" width="752" height="374" rx="10"/>
  <rect class="gray" x="68.0" y="175.52" width="109.44" height="51.52" rx="7"/>
  <text class="label" x="122.7" y="185.3" text-anchor="middle" dominant-baseline="middle">unused slot</text>
  <text class="muted" x="122.7" y="201.3" text-anchor="middle" dominant-baseline="middle">free process-</text>
  <text class="muted" x="122.7" y="217.3" text-anchor="middle" dominant-baseline="middle">table entry</text>
  <rect class="green" x="259.52" y="175.52" width="136.8" height="51.52" rx="7"/>
  <text class="label" x="327.9" y="185.3" text-anchor="middle" dominant-baseline="middle">ready to run</text>
  <text class="muted" x="327.9" y="201.3" text-anchor="middle" dominant-baseline="middle">eligible for</text>
  <text class="muted" x="327.9" y="217.3" text-anchor="middle" dominant-baseline="middle">scheduling</text>
  <rect class="blue" x="478.4" y="175.52" width="82.08" height="51.52" rx="7"/>
  <text class="label" x="519.4" y="185.3" text-anchor="middle" dominant-baseline="middle">running</text>
  <text class="muted" x="519.4" y="201.3" text-anchor="middle" dominant-baseline="middle">currently</text>
  <text class="muted" x="519.4" y="217.3" text-anchor="middle" dominant-baseline="middle">on the CPU</text>
  <rect class="gray" x="628.88" y="175.52" width="123.11999999999999" height="51.52" rx="7"/>
  <text class="label" x="690.4" y="185.3" text-anchor="middle" dominant-baseline="middle">zombie</text>
  <text class="muted" x="690.4" y="201.3" text-anchor="middle" dominant-baseline="middle">exited, waiting</text>
  <text class="muted" x="690.4" y="217.3" text-anchor="middle" dominant-baseline="middle">to be reaped</text>
  <rect class="amber" x="451.04" y="352.62" width="136.8" height="57.96" rx="7"/>
  <text class="label" x="519.4" y="365.6" text-anchor="middle" dominant-baseline="middle">waiting</text>
  <text class="muted" x="519.4" y="381.6" text-anchor="middle" dominant-baseline="middle">blocked on an</text>
  <text class="muted" x="519.4" y="397.6" text-anchor="middle" dominant-baseline="middle">event</text>
  <polyline class="arrow" points="177.4,201.3 259.5,201.3" fill="none"/>
  <rect class="edge-label-bg" x="193.3" y="163.5" width="50.4" height="18" rx="6"/>
  <text class="muted" x="218.48" y="175.52" text-anchor="middle">create</text>
  <polyline class="arrow" points="396.3,201.3 478.4,201.3" fill="none"/>
  <rect class="edge-label-bg" x="405.8" y="163.5" width="63.2" height="18" rx="6"/>
  <text class="muted" x="437.36" y="175.52" text-anchor="middle">schedule</text>
  <polyline class="arrow" points="519.4,175.5 519.4,161.5 519.4,140.1 327.9,140.1 327.9,161.5 327.9,175.5" fill="none"/>
  <rect class="edge-label-bg" x="369.7" y="110.1" width="108.0" height="18" rx="6"/>
  <text class="muted" x="423.68" y="122.1" text-anchor="middle">preempt / yield</text>
  <polyline class="arrow" points="519.4,227.0 519.4,352.6" fill="none"/>
  <rect class="edge-label-bg" x="548.6" y="292.3" width="44.0" height="18" rx="6"/>
  <text class="muted" x="553.64" y="304.32000000000005" text-anchor="start">block</text>
  <polyline class="arrow" points="451.0,381.6 327.9,381.6 327.9,241.0 327.9,227.0" fill="none"/>
  <rect class="edge-label-bg" x="350.2" y="318.1" width="37.6" height="18" rx="6"/>
  <text class="muted" x="368.96" y="330.08000000000004" text-anchor="middle">wake</text>
  <polyline class="arrow" points="560.5,201.3 628.9,201.3" fill="none"/>
  <rect class="edge-label-bg" x="575.9" y="163.5" width="37.6" height="18" rx="6"/>
  <text class="muted" x="594.6800000000001" y="175.52" text-anchor="middle">exit</text>
  <polyline class="arrow" points="690.4,227.0 690.4,241.0 690.4,423.5 122.7,423.5 122.7,227.0" fill="none"/>
  <rect class="edge-label-bg" x="377.5" y="435.5" width="37.6" height="18" rx="6"/>
  <text class="muted" x="396.32" y="447.46000000000004" text-anchor="middle">reap</text>
  <text class="muted" x="786.0" y="502.0" text-anchor="end">Chapter 15, Figure 2</text>
</svg>
