<svg xmlns="http://www.w3.org/2000/svg" width="365.6" height="642" viewBox="0 0 365.6 642" role="img" aria-labelledby="title desc">
  <title id="title">Window z-order at present time</title>
  <desc id="desc">The compositor walks the stack from bottom to top; whichever window has the highest z value paints last and ends up on top.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#0f172a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.3; }
      .chip { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .vector { fill: #ecfdf5; stroke: #059669; stroke-width: 1.5; }
      .tag { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.25; }
      .cell { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .attr { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.4; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .gap { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-shell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .table-headband { fill: #f8fafc; }
      .table-rule { stroke: #cbd5e1; stroke-width: 1; }
      .edge-label-bg { fill: #ffffff; fill-opacity: 0.94; }
      .title { fill: #0f172a; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #0f172a; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-tight { fill: #0f172a; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-mini { fill: #0f172a; font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label-micro { fill: #0f172a; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .colhead { fill: #334155; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #334155; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64748b; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #0f172a; font: 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .byte { fill: #0f172a; font: 600 12px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; stroke-linecap: round; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 1.6; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="365.6" height="642" rx="12"/>
  <text class="title" x="44" y="42">Window z-order at present time</text>
  <text class="muted" x="44" y="68">The compositor walks the stack from bottom to</text>
  <text class="muted" x="44" y="84">top; whichever window has the highest z value</text>
  <text class="muted" x="44" y="100">paints last and ends up on top.</text>
  <rect class="panel" x="34" y="130" width="297.6" height="464" rx="10"/>
  <rect class="amber" x="68.00000000000001" y="156" width="229.6" height="68" rx="7"/>
  <text class="label" x="182.8" y="182.0" text-anchor="middle" dominant-baseline="middle">Launcher overlay (when open)</text>
  <text class="muted" x="182.8" y="198.0" text-anchor="middle" dominant-baseline="middle">absorbs input above all else</text>
  <rect class="blue" x="68.00000000000001" y="242" width="229.6" height="68" rx="7"/>
  <text class="label" x="182.8" y="268.0" text-anchor="middle" dominant-baseline="middle">Taskbar strip</text>
  <text class="muted" x="182.8" y="284.0" text-anchor="middle" dominant-baseline="middle">top-of-screen chrome</text>
  <rect class="green" x="68.00000000000001" y="328" width="229.6" height="68" rx="7"/>
  <text class="label" x="182.8" y="354.0" text-anchor="middle" dominant-baseline="middle">Focused window</text>
  <text class="muted" x="182.8" y="370.0" text-anchor="middle" dominant-baseline="middle">highest z, painted last</text>
  <rect class="blue" x="68.00000000000001" y="414" width="229.6" height="68" rx="7"/>
  <text class="label" x="182.8" y="440.0" text-anchor="middle" dominant-baseline="middle">Other windows</text>
  <text class="muted" x="182.8" y="456.0" text-anchor="middle" dominant-baseline="middle">painted in z order</text>
  <rect class="gray" x="68.00000000000001" y="500" width="229.6" height="68" rx="7"/>
  <text class="label" x="182.8" y="526.0" text-anchor="middle" dominant-baseline="middle">Desktop background</text>
  <text class="muted" x="182.8" y="542.0" text-anchor="middle" dominant-baseline="middle">painted first</text>
  <text class="muted" x="331.6" y="624.0" text-anchor="end">Chapter 28, Figure 3</text>
</svg>
